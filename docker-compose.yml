services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chamados
      POSTGRES_PASSWORD: chamados
      POSTGRES_DB: chamados_development
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chamados"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
